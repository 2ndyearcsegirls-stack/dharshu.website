

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Login</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            background:linear-gradient(135deg,#0f4c81,#00b4db);
        }

        .login-box{
            width:350px;
            background:white;
            padding:30px;
            border-radius:12px;
            box-shadow:0 10px 25px rgba(0,0,0,0.2);
            text-align:center;
        }

        .logo{
            width:90px;
            margin-bottom:15px;
        }

        h2{
            margin-bottom:20px;
            color:#333;
        }

        input{
            width:100%;
            padding:12px;
            margin:10px 0;
            border:1px solid #ccc;
            border-radius:6px;
        }

        button{
            width:100%;
            padding:12px;
            border:none;
            border-radius:6px;
            background:#0f4c81;
            color:white;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#08345c;
        }

        p{
            margin-top:15px;
            font-size:14px;
        }

        a{
            text-decoration:none;
            color:#0f4c81;
        }
    </style>
</head>
<body>

<div class="login-box">

    <!-- Replace logo.png with your college logo -->
    <img src="logo.png" class="logo" alt="College Logo">

    <h2>Student Login</h2>

    <form>
        <input type="text" placeholder="Username" required>
        <input type="password" placeholder="Password" required>

        <button type="submit">Login</button>
    </form>

    <p><a href="#">Forgot Password?</a></p>

</div>

</body>
</html>
